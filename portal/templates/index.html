<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yt-learn Portal</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header class="header">
  <div class="header-logo">yt<span>-</span>learn</div>
</header>

<nav class="tabbar">
  <button class="tab-btn" data-tab="home">HOME</button>
  <button class="tab-btn" data-tab="status">STATUS</button>
  <button class="tab-btn" data-tab="library">LIBRARY</button>
  <button class="tab-btn" data-tab="logs">LOGS</button>
  <button class="tab-btn" data-tab="readme">README</button>
</nav>

<main class="main">

  <!-- HOME -->
  <div id="pane-home" class="pane">
    <div class="grid-2">
      <div>
        <div class="card">
          <div class="card-title">登録チャンネル</div>
          <div class="channel-list" id="channel-list">
            <div class="placeholder">
              <div class="placeholder-icon">📡</div>
              <span>チャンネルを読み込んでいます…</span>
            </div>
          </div>
        </div>
      </div>
      <div>
        <div class="card">
          <div class="card-title">実行パネル</div>
          <div class="placeholder">
            <div class="placeholder-icon">🚀</div>
            <span>Phase 2 で実装予定</span>
          </div>
        </div>
        <div class="card">
          <div class="card-title">URL 単発処理</div>
          <div class="placeholder">
            <div class="placeholder-icon">🎬</div>
            <span>Phase 2 で実装予定</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- STATUS -->
  <div id="pane-status" class="pane">
    <div class="card">
      <div class="card-title">autonomous.sh — 直近ログ（末尾 50 行）</div>
      <div class="log-output" id="status-log">STATUS タブをクリックして読み込みます…</div>
    </div>
    <div class="card">
      <div class="card-title">リアルタイム監視</div>
      <div class="placeholder">
        <div class="placeholder-icon">📡</div>
        <span>Phase 3 で WebSocket リアルタイム更新を実装予定</span>
      </div>
    </div>
  </div>

  <!-- LIBRARY -->
  <div id="pane-library" class="pane">
    <div class="card">
      <div class="card-title">トランスクリプトライブラリ</div>
      <div class="placeholder">
        <div class="placeholder-icon">📚</div>
        <span>Phase 4 で全文検索付きライブラリを実装予定</span>
      </div>
    </div>
  </div>

  <!-- LOGS -->
  <div id="pane-logs" class="pane">
    <div class="card">
      <div class="card-title">ログファイル一覧</div>
      <div class="channel-list" id="log-list">
        <div class="placeholder">
          <div class="placeholder-icon">📄</div>
          <span>LOGS タブをクリックして読み込みます…</span>
        </div>
      </div>
    </div>
  </div>

  <!-- README -->
  <div id="pane-readme" class="pane">
    <div class="card">
      <div class="card-title">README.md</div>
      <pre class="readme-content" id="readme-body">README タブをクリックして読み込みます…</pre>
    </div>
  </div>

</main>

<script src="/static/app.js"></script>
</body>
</html>
