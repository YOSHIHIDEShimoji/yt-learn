<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yt-learn Portal</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header class="header">
  <button class="header-logo-btn" onclick="goHome()">
    <img src="/static/logo.png" alt="yt-learn" class="header-logo-img">
  </button>
</header>

<nav class="tabbar">
  <button class="tab-btn" data-tab="home">HOME</button>
  <button class="tab-btn" data-tab="status">STATUS</button>
  <button class="tab-btn" data-tab="library">LIBRARY</button>
  <button class="tab-btn" data-tab="logs">LOGS</button>
  <button class="tab-btn" data-tab="readme">README</button>
</nav>

<main class="main">

  <!-- HOME -->
  <div id="pane-home" class="pane">
    <div class="grid-2">
      <div>
        <div class="card">
          <div class="card-title-row">
            <span class="card-title" style="margin-bottom:0">登録チャンネル</span>
            <div style="display:flex;gap:6px">
              <button class="refresh-btn" onclick="openAddChannelModal()">+ 追加</button>
              <button class="refresh-btn" onclick="reloadChannels()">↻ 更新</button>
            </div>
          </div>
          <div class="channel-list" id="channel-list">
            <div class="placeholder"><div class="placeholder-icon">📡</div><span>読み込み中…</span></div>
          </div>
        </div>
      </div>
      <div>
        <!-- クイック実行 -->
        <div class="card">
          <div class="card-title-row">
            <span class="card-title" style="margin-bottom:0">クイック実行</span>
            <span id="run-badge" class="badge badge-gray">確認中…</span>
          </div>
          <div id="run-wsl-warn" class="run-warn" style="display:none">WSL 環境専用機能です</div>
          <div class="run-btns" style="margin-top:4px">
            <button id="run-start-btn" class="btn-primary" onclick="startRun()">▶ 起動</button>
            <button id="run-stop-btn" class="btn-danger" style="display:none" onclick="stopRun()">■ 停止</button>
          </div>
        </div>

        <!-- URL 処理 -->
        <div class="card">
          <div class="card-title">URL 処理</div>
          <div class="run-form">
            <div class="form-row">
              <label class="form-label">YouTube URL（1行1件、複数可）</label>
              <textarea id="proc-urls" class="form-input form-textarea" rows="3"
                placeholder="https://www.youtube.com/watch?v=...&#10;https://www.youtube.com/watch?v=..."></textarea>
            </div>
            <div class="form-row">
              <label class="form-label">チャンネル名（保存先）</label>
              <select id="proc-channel" class="form-input"></select>
            </div>
            <div class="form-row">
              <label class="form-label">言語</label>
              <select id="proc-lang" class="form-input">
                <option value="ja">ja</option>
                <option value="en">en</option>
              </select>
            </div>
          </div>
          <div class="run-btns">
            <button id="proc-submit-btn" class="btn-primary" onclick="processUrl()">▶ 処理開始</button>
          </div>
          <div id="proc-result" class="proc-result"></div>
        </div>

        <!-- その他 -->
        <div class="card">
          <div class="card-title">その他</div>
          <div class="run-form">
            <div class="form-row">
              <label class="form-label">Threshold（summarize 用、単語数未満をスキップ）</label>
              <input id="batch-threshold" type="number" class="form-input" value="20" min="1" max="1000">
            </div>
          </div>
          <div class="run-btns" style="flex-wrap:wrap;gap:6px">
            <button class="btn-primary" onclick="summarizeAll()">▶ Summarize All</button>
            <button class="btn-primary" onclick="transcribeSync()">↻ Drive Sync</button>
          </div>
          <div id="batch-result" class="proc-result"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- STATUS -->
  <div id="pane-status" class="pane">
    <!-- ヘッダー -->
    <div class="card status-header-card" id="status-header-card">
      <div class="placeholder"><div class="placeholder-icon">⏳</div><span>読み込み中…</span></div>
    </div>

    <!-- 左右パネル（高さ揃え） -->
    <div class="grid-2">
      <div class="card status-videos-card">
        <div class="card-title-row">
          <span class="card-title" style="margin-bottom:0">処理済み動画（今セッション）</span>
          <button class="refresh-btn" onclick="reloadStatus()">↻ 更新</button>
        </div>
        <div class="status-videos-scroll" id="status-videos">
          <div class="placeholder"><div class="placeholder-icon">🎞️</div><span>読み込み中…</span></div>
        </div>
      </div>
      <div class="card status-stats-card">
        <div class="card-title">統計 <span style="font-size:10px;color:var(--text-faint);font-weight:400;letter-spacing:0;text-transform:none">（数字クリックでログフィルタ）</span></div>
        <div id="status-stats"><div class="placeholder"><div class="placeholder-icon">📊</div><span>読み込み中…</span></div></div>
      </div>
    </div>

    <!-- GPU（下段 full-width） -->
    <div class="card">
      <div class="card-title">GPU 使用率</div>
      <div class="placeholder"><div class="placeholder-icon">🖥️</div><span>Phase 3 で実装予定（リアルタイムグラフ）</span></div>
    </div>

  </div>

  <!-- LIBRARY -->
  <div id="pane-library" class="pane">
    <div class="card">
      <div class="card-title">トランスクリプトライブラリ</div>
      <div class="placeholder"><div class="placeholder-icon">📚</div><span>Phase 4 で全文検索付きライブラリを実装予定</span></div>
    </div>
  </div>

  <!-- LOGS -->
  <div id="pane-logs" class="pane">
    <div class="grid-2 logs-grid">
      <div class="card">
        <div class="card-title-row">
          <span class="card-title" style="margin-bottom:0">ログファイル一覧</span>
          <button class="refresh-btn" onclick="reloadLogs()">↻ 更新</button>
        </div>
        <div class="channel-list" id="log-list">
          <div class="placeholder"><div class="placeholder-icon">📄</div><span>読み込み中…</span></div>
        </div>
      </div>
      <div class="card" id="log-viewer-card" style="display:none">
        <div class="card-title-row">
          <span class="card-title" id="log-viewer-title" style="margin-bottom:0"></span>
          <button class="refresh-btn" onclick="closeLogViewer()">✕ 閉じる</button>
        </div>
        <div class="log-output" id="log-viewer-content"></div>
      </div>
    </div>
  </div>

  <!-- README -->
  <div id="pane-readme" class="pane">
    <div class="card">
      <div class="card-title-row">
        <span class="card-title" style="margin-bottom:0">README.md</span>
        <button class="refresh-btn" onclick="reloadReadme()">↻ 再読み込み</button>
      </div>
      <div class="markdown-body" id="readme-body">読み込み中…</div>
    </div>
  </div>

</main>

<!-- チャンネル追加モーダル -->
<div id="add-channel-modal" class="modal-backdrop" style="display:none"
     onclick="if(event.target===this)closeAddChannelModal()">
  <div class="modal-box">
    <div class="modal-title">チャンネルを追加</div>
    <div class="run-form">
      <div class="form-row">
        <label class="form-label">チャンネル名</label>
        <input id="modal-name" type="text" class="form-input" placeholder="ひろゆき">
      </div>
      <div class="form-row">
        <label class="form-label">YouTube URL</label>
        <input id="modal-url" type="url" class="form-input" placeholder="https://www.youtube.com/@...">
      </div>
      <div class="form-row">
        <label class="form-label">言語</label>
        <select id="modal-lang" class="form-input">
          <option value="ja">ja</option>
          <option value="en">en</option>
        </select>
      </div>
    </div>
    <div id="modal-error" class="modal-error"></div>
    <div class="modal-btns">
      <button class="btn-secondary" onclick="closeAddChannelModal()">キャンセル</button>
      <button class="btn-primary" onclick="submitAddChannel()">追加</button>
    </div>
  </div>
</div>

<!-- 汎用確認ダイアログ -->
<div id="confirm-modal" class="modal-backdrop" style="display:none">
  <div class="modal-box">
    <div class="modal-title" id="confirm-message"></div>
    <div class="modal-btns">
      <button class="btn-secondary" id="confirm-cancel">キャンセル</button>
      <button class="btn-danger"    id="confirm-ok">削除</button>
    </div>
  </div>
</div>

<!-- ログフィルタモーダル -->
<div id="log-filter-modal" class="modal-backdrop" style="display:none"
     onclick="if(event.target===this)closeLogFilter()">
  <div class="modal-box modal-box-wide">
    <div class="modal-title-row">
      <span class="modal-title" id="log-filter-title" style="margin-bottom:0"></span>
      <span style="font-size:12px;color:var(--text-faint)" id="log-filter-count"></span>
      <button class="refresh-btn" onclick="closeLogFilter()">✕ 閉じる</button>
    </div>
    <div class="log-output log-filter-output" id="log-filter-content"></div>
  </div>
</div>

<script src="/static/marked.min.js"></script>
<script src="/static/app.js"></script>

<!-- Liquid Glass SVG filter: organic edge distortion for tab capsule -->
<svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
  <defs>
    <filter id="lg-tab" x="-20%" y="-30%" width="140%" height="160%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.038 0.060" numOctaves="3" seed="12" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
</svg>
</body>
</html>
